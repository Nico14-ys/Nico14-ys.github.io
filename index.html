<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- NES.css from jsDelivr -->
    <link href="https://cdn.jsdelivr.net/npm/nes.css/css/nes.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="surprise/css/style.css">

</head>

<body>
    <canvas id="pixel-bg"></canvas>

    <div class="icon-container">
        <div id="video-icon" class="corner-icon left">
            <div id="video-icon" class="video"> </div>
            <div id="video-dot-icon" class="video-dot not-played"> </div>
        </div>
        <div id="letter-icon" class="corner-icon right">
            <div id="letter-icon" class="corner-icon letter closed"></div>
            <div id="letter-dot-icon" class="corner-icon letter-dot not-opened"></div>
        </div>
    </div>

    <div id="title" class="title">
        <h1>Happy Birthday!</h1>
    </div>
    <!-- Cake Display (shared across screens) -->
    <div class="cake-wrapper">
        <div class="plate" id="plate"></div>
        <div class="cake-base sponge" id="cake-base"></div>
        <div class="cake-topping-back strawberries" id="cake-topping-back"></div>
        <div class="candle-back blue" id="candle-back"></div>
        <div class="flame flame-8 flame-normal" id="flame-8"></div>
        <div class="flame flame-7 flame-normal" id="flame-7"></div>
        <div class="flame flame-6 flame-normal" id="flame-6"></div>
        <div class="flame flame-5 flame-normal" id="flame-5"></div>
        <div class="cake-topping strawberries" id="cake-topping"></div>
        <div class="flame flame-4 flame-normal" id="flame-4"></div>
        <div class="flame flame-3 flame-normal" id="flame-3"></div>
        <div class="flame flame-2 flame-normal" id="flame-2"></div>
        <div class="flame flame-1 flame-normal" id="flame-1"></div>
        <div class="candle-front blue" id="candle-front"></div>
    </div>

    <!-- Main Menu -->
    <div id="menu-screen" class="screen">
        <button id="customise-btn" class="nes-btn custom">Customize Cake</button>
        <button id="blow-btn" class="nes-btn custom">Blow Candles</button>
        <button onclick="launchConfetti()">confetti</button>
        <!-- <button onclick="tryBlowCandles()">blow</button> -->
        <button onclick="resetCandles()">reset</button>
    </div>

    <div id="customise-screen" class="screen hidden">
        <div class="steps-wrapper">
            <div class="step" id="step-1">
                <h2>Choose Base</h2>
                <div class="options">
                    <button onclick="chooseBase('sponge')">Sponge</button>
                    <button onclick="chooseBase('chocolate')">Chocolate</button>
                    <button onclick="chooseBase('matcha')">Matcha</button>
                    <button onclick="chooseBase('mooncake')">Mooncake</button>
                    <button onclick="chooseBase('hamburger')">Hamburger</button>
                </div>
                <button id="next-1" disabled>Next ➡️</button>
            </div>

            <div class="step" id="step-2">
                <h2>Choose Topping</h2>
                <div class="options">
                    <button onclick="chooseTopping('strawberries')">Strawberries</button>
                    <button onclick="chooseTopping('blueberries')">Blueberries</button>
                    <button onclick="chooseTopping('octopus')">Octopus</button>
                    <button onclick="chooseTopping('veggies-and-fruit')">Veggies & Fruit</button>
                    <button onclick="chooseTopping('none')">None</button>
                </div>
                <button id="back-2">⬅️ Back</button>
                <button id="next-2" disabled>Next ➡️</button>
            </div>

            <div class="step" id="step-3">
                <h2>Choose Candle</h2>
                <div class="options">
                    <button onclick="chooseCandle('blue')">Blue</button>
                    <button onclick="chooseCandle('purple')">Purple</button>
                    <button onclick="chooseCandle('gold')">Gold</button>
                    <button onclick="chooseCandle('rainbow')">Rainbow</button>
                </div>
                <button id="back-3">⬅️ Back</button>
                <button id="customise-done" disabled>Done 🎉</button>
            </div>
        </div>
    </div>

    <div id="blow-candle-screen" class="screen hidden">
        <div id="candle-text" class="candle-text">
            <h2>Try blowing the candles!</h2>
        </div>
        <button onclick="tryBlowCandles()">Blow</button>
        <button onclick="resetCandles()">Again!</button>
        <button id="blow-done">I'm done!</button>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <!-- Overlay + Popup -->
    <div id="overlay" class="overlay hidden"></div>
    <div id="letter-popup" class="popup hidden">
        <div class="popup-content">
            <button id="close-popup" class="close-btn nes-btn is-error">X</button>
            <h2>A Birthday Letter 💌</h2>
            <p>
                Dear Friend,<br>
                Wishing you the sweetest birthday ever! 🎂✨<br>
                Hope all your wishes come true!
            </p>
        </div>
    </div>


    <script src="surprise/js/script.js"></script>
</body>
